# ========================================================
# CONFIGURAÇÃO DO BANCO MYSQL
# ========================================================

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/festasdb?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ========================================================
# CONFIGURAÇÃO JPA/HIBERNATE
# ========================================================

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# ========================================================
# CONFIGURAÇÕES ADICIONAIS
# ========================================================

spring.application.name=sistema-festas

logging.level.com.example.festas=INFO
logging.level.org.springframework.security=WARN

spring.jackson.serialization.fail-on-empty-beans=false

# Chave secreta para assinatura dos Tokens JWT
api.security.token.secret=${JWT_SECRET}

# ========================================================
# CORS
# ========================================================
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:4200,http://localhost:3000}

# ========================================================
# ADMIN PADRÃO
# ========================================================
admin.default.email=${ADMIN_EMAIL:admin@festas.com}
admin.default.password=${ADMIN_PASSWORD}
